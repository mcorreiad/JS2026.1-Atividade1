<!DOCTYPE html>

<head>

    <title>Exercicio 3 Atv.1</title>
</head>
    <body>
        <script>
                let A = parseInt(prompt("Digite o valor inteiro de A:"));
                let B = parseInt(prompt("Digite o valor inteiro de B:"));
                let C;

                if (A === B) {
                    C = A + B;
                    console.log(`A e B são iguais → Soma: C = ${A} + ${B} = ${C}`);
                } else {
                    C = A * B;
                    console.log(`A e B são diferentes → Multiplicação: C = ${A} x ${B} = ${C}`);
                }
                console.log("Valor de C =", C);
        </script>
    </body>
