    <body>
        <script>
            let numero = parseInt(prompt("Digite um número inteiro:"));

            let antecessor = numero - 1;
            let sucessor   = numero + 1;

            console.log("Número informado:", numero);
            console.log("Antecessor:", antecessor);
            console.log("Sucessor:", sucessor);
        </script>
