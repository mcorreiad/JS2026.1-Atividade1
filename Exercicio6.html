<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6 Atv.1</title>
</head>
    <body>
        <script>
            let valor = parseFloat(prompt("Digite um valor:"));

            let reajuste      = valor * 0.05;
            let valorReajuste = valor + reajuste;

            console.log(`Valor original: R$ ${valor.toFixed(2)}`);
            console.log(`Reajuste (5%): R$ ${reajuste.toFixed(2)}`);
            console.log(`Valor com reajuste: R$ ${valorReajuste.toFixed(2)}`);
        </script>
    </body>
